server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css text/plain application/javascript image/svg+xml;
    gzip_min_length 512;
    # woff2 is already compressed — no gzip needed.

    # HTML: always revalidate so config/content changes show up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Fonts and CSS: long-lived cache.
    location ~* \.(css|woff2)$ {
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
